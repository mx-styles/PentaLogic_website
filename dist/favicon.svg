<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#07191E"/>
  <circle cx="50" cy="50" r="8" fill="#02F5A1"/>
  <circle cx="50" cy="50" r="8" fill="#02F5A1" opacity="0.6">
    <animate attributeName="r" values="8;20;8" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;0;0.6" dur="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>
