<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Pentalogic Consultancy</title>
    <meta name="description" content="The page you're looking for doesn't exist. Return to Pentalogic Consultancy.">
    <link rel="icon" type="image/x-icon" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/assets/images/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #07191E;
        --accent: #02F5A1;
        --accent-soft: rgba(2,245,161,0.12);
        --accent-border: rgba(2,245,161,0.28);
        --white: #FFFFFF;
        --muted: rgba(255,255,255,0.62);
        --muted-2: rgba(255,255,255,0.38);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: var(--bg);
        color: var(--white);
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        height: 100%;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        position: relative;
        overflow: hidden;
      }

      /* Background glow */
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(ellipse 80% 60% at 50% 40%, rgba(2,245,161,0.07), transparent 65%),
          var(--bg);
        pointer-events: none;
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 2rem;
        max-width: 560px;
      }

      .error-code {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(6rem, 20vw, 12rem);
        font-weight: 700;
        line-height: 1;
        color: var(--accent);
        text-shadow: 0 0 80px rgba(2,245,161,0.2);
        margin-bottom: 0.5rem;
      }

      .glow-line {
        width: 80px;
        height: 2px;
        background: var(--accent);
        margin: 1.5rem auto;
        opacity: 0.5;
        border-radius: 2px;
      }

      h1 {
        font-family: 'Space Grotesk', sans-serif;
        font-size: clamp(1.25rem, 3vw, 1.75rem);
        font-weight: 600;
        margin-bottom: 0.75rem;
        color: var(--white);
      }

      p {
        font-size: clamp(0.95rem, 2vw, 1.1rem);
        color: var(--muted);
        line-height: 1.7;
        margin-bottom: 2.5rem;
      }

      .btn-home {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.85rem 2rem;
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent-border);
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 1rem;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.3s ease;
        cursor: pointer;
      }

      .btn-home:hover {
        background: var(--accent-soft);
        border-color: var(--accent);
        box-shadow: 0 0 30px rgba(2,245,161,0.1);
      }

      .btn-home svg {
        width: 18px;
        height: 18px;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        transition: transform 0.3s ease;
      }

      .btn-home:hover svg {
        transform: translateX(-3px);
      }

      .mono-hint {
        font-family: 'IBM Plex Mono', monospace;
        font-size: 0.8rem;
        color: var(--muted-2);
        margin-top: 3rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="error-code">404</div>
      <div class="glow-line"></div>
      <h1>Page not found</h1>
      <p>The intelligence you're looking for doesn't exist here.<br>Let's get you back on course.</p>
      <a href="/" class="btn-home">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to home
      </a>
      <div class="mono-hint">ERR_PAGE_NOT_FOUND</div>
    </div>
  </body>
</html>
