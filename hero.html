<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pentalogic — Intelligence that sees first</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#07191E;
    --accent:#02F5A1;
    --accent-soft:rgba(2,245,161,0.12);
    --accent-border:rgba(2,245,161,0.28);
    --white:#FFFFFF;
    --muted:rgba(255,255,255,0.62);
    --muted-2:rgba(255,255,255,0.38);
    --onyx-text:#07191E;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    background:var(--bg);
    color:var(--white);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  .hero{
    position:relative;
    min-height:100vh;
    width:100%;
    overflow:hidden;
    background:var(--bg);
    display:flex;
    flex-direction:column;
  }

  /* ---------- grid overlay ---------- */
  .grid-overlay{
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(to right, rgba(2,245,161,0.07) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(2,245,161,0.07) 1px, transparent 1px);
    background-size:60px 60px;
    -webkit-mask-image: radial-gradient(ellipse 85% 70% at 50% 28%, black 35%, transparent 92%);
    mask-image: radial-gradient(ellipse 85% 70% at 50% 28%, black 35%, transparent 92%);
    pointer-events:none;
    z-index:2;
  }

  /* brighter grid + soft glow that tracks the cursor, revealed only nearby */
  .grid-spotlight{
    position:absolute;
    inset:0;
    background-image:
      radial-gradient(circle 240px at var(--mx,50%) var(--my,-20%), rgba(2,245,161,0.18), transparent 70%),
      linear-gradient(to right, rgba(2,245,161,0.4) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(2,245,161,0.4) 1px, transparent 1px);
    background-size:100% 100%, 60px 60px, 60px 60px;
    -webkit-mask-image: radial-gradient(circle 240px at var(--mx,50%) var(--my,-20%), black 0%, transparent 78%);
    mask-image: radial-gradient(circle 240px at var(--mx,50%) var(--my,-20%), black 0%, transparent 78%);
    pointer-events:none;
    z-index:2;
    opacity:0;
    transition:opacity .5s ease;
  }

  .vignette{
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse 70% 60% at 50% 22%, rgba(2,245,161,0.05), transparent 70%);
    pointer-events:none;
    z-index:3;
  }

  /* ---------- nav ---------- */
  nav{
    position:relative;
    z-index:10;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:28px 48px;
  }

  .logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:18px;
    letter-spacing:0.2px;
  }

  .logo-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 0 rgba(2,245,161,0.6);
    animation:pulse-dot 2.6s ease-out infinite;
  }

  @keyframes pulse-dot{
    0%{box-shadow:0 0 0 0 rgba(2,245,161,0.55);}
    70%{box-shadow:0 0 0 8px rgba(2,245,161,0);}
    100%{box-shadow:0 0 0 0 rgba(2,245,161,0);}
  }

  .nav-links{
    display:flex;
    gap:40px;
    list-style:none;
  }

  .nav-links a{
    color:var(--muted);
    text-decoration:none;
    font-size:14.5px;
    font-weight:500;
    letter-spacing:0.2px;
    transition:color .25s ease;
    position:relative;
  }

  .nav-links a:hover{color:var(--white);}

  .nav-links a::after{
    content:'';
    position:absolute;
    left:0; bottom:-6px;
    width:0; height:1px;
    background:var(--accent);
    transition:width .25s ease;
  }

  .nav-links a:hover::after{width:100%;}

  .nav-cta{
    display:none;
  }

  .menu-toggle{
    display:none;
    background:none;
    border:1px solid var(--accent-border);
    border-radius:8px;
    width:38px;
    height:38px;
    color:var(--accent);
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }

  /* ---------- faint background image ---------- */
  .bg-image{
    position:absolute;
    inset:0;
    z-index:0;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    overflow:hidden;
    pointer-events:none;
  }

  .bg-image img{
    width:min(880px, 72vw);
    height:auto;
    margin-top:2vh;
    object-fit:contain;
    opacity:0.1;
    mix-blend-mode:screen;
    filter:saturate(0.85) brightness(1.05);
    -webkit-mask-image: radial-gradient(ellipse 58% 52% at 50% 34%, black 35%, transparent 85%);
    mask-image: radial-gradient(ellipse 58% 52% at 50% 34%, black 35%, transparent 85%);
  }

  /* ---------- content ---------- */
  .content{
    position:relative;
    z-index:8;
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 24px 80px;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:1.6px;
    color:var(--accent);
    background:var(--accent-soft);
    border:1px solid var(--accent-border);
    padding:7px 14px;
    border-radius:99px;
    margin-bottom:26px;
    text-transform:uppercase;
  }

  .eyebrow .dot{
    width:6px; height:6px;
    border-radius:50%;
    background:var(--accent);
    animation:pulse-dot 2.6s ease-out infinite;
  }

  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight:600;
    font-size:clamp(38px, 6vw, 72px);
    line-height:1.08;
    letter-spacing:-1px;
    max-width:880px;
    color:var(--white);
  }

  h1 .accent{
    color:var(--accent);
  }

  .sub{
    margin-top:24px;
    max-width:560px;
    font-size:16.5px;
    line-height:1.65;
    color:var(--muted);
    font-weight:400;
  }

  .cta-row{
    display:flex;
    gap:16px;
    margin-top:38px;
    flex-wrap:wrap;
    justify-content:center;
  }

  .btn{
    font-family:'Inter',sans-serif;
    font-size:15px;
    font-weight:600;
    padding:14px 28px;
    border-radius:8px;
    cursor:pointer;
    transition:transform .2s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
    letter-spacing:0.1px;
  }

  .btn-primary{
    background:var(--accent);
    color:var(--onyx-text);
    border:1px solid var(--accent);
  }

  .btn-primary:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 24px rgba(2,245,161,0.25);
  }

  .btn-secondary{
    background:transparent;
    color:var(--white);
    border:1px solid rgba(255,255,255,0.22);
  }

  .btn-secondary:hover{
    border-color:var(--accent);
    color:var(--accent);
    transform:translateY(-2px);
  }

  .signal{
    margin-top:56px;
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:0.5px;
    color:var(--muted-2);
  }

  .signal .bars{
    display:flex;
    gap:3px;
    align-items:flex-end;
    height:12px;
  }
  .signal .bars span{
    width:3px;
    background:var(--accent);
    opacity:0.7;
    animation:barpulse 1.6s ease-in-out infinite;
  }
  .signal .bars span:nth-child(1){height:40%; animation-delay:0s;}
  .signal .bars span:nth-child(2){height:70%; animation-delay:.2s;}
  .signal .bars span:nth-child(3){height:100%; animation-delay:.4s;}
  .signal .bars span:nth-child(4){height:55%; animation-delay:.6s;}

  @keyframes barpulse{
    0%,100%{opacity:0.35;}
    50%{opacity:1;}
  }

  /* entrance animation */
  .fade-up{
    opacity:0;
    transform:translateY(16px);
    animation:fadeUp .7s ease forwards;
  }
  @keyframes fadeUp{ to{ opacity:1; transform:translateY(0); } }

  @media (prefers-reduced-motion: reduce){
    .logo-dot, .eyebrow .dot, .signal .bars span, .fade-up{
      animation:none !important;
    }
    .fade-up{opacity:1; transform:none;}
  }

  /* ---------- responsive ---------- */
  @media (max-width: 820px){
    nav{padding:22px 22px;}
    .nav-links{
      position:absolute;
      top:64px;
      right:22px;
      left:22px;
      background:#0a2026;
      border:1px solid var(--accent-border);
      border-radius:10px;
      flex-direction:column;
      gap:0;
      padding:8px;
      display:none;
      z-index:20;
    }
    .nav-links.open{display:flex;}
    .nav-links a{
      padding:12px 10px;
      width:100%;
    }
    .nav-links a::after{display:none;}
    .menu-toggle{display:flex;}
    .bg-image img{width:84vw;}
    h1{letter-spacing:-0.5px;}
    .content{padding-top:8px;}
  }

  @media (max-width: 480px){
    .bg-image img{width:92vw;}
    .sub{font-size:15px;}
    .btn{padding:13px 22px; font-size:14px;}
  }
</style>
</head>

<script>
  const toggle = document.getElementById('menuToggle');
  const links = document.getElementById('navLinks');
  toggle.addEventListener('click', () => links.classList.toggle('open'));

  // grid spotlight: brightens nearby grid lines and follows the cursor
  (function(){
    const hero = document.querySelector('.hero');
    const spotlight = document.getElementById('gridSpotlight');
    if(!hero || !spotlight) return;
    if(window.matchMedia('(prefers-reduced-motion: reduce)').matches || matchMedia('(hover: none)').matches){
      return; // skip on touch devices / reduced-motion preference
    }

    let targetX = 50, targetY = -20, curX = 50, curY = -20, active = false;

    function loop(){
      curX += (targetX - curX) * 0.16;
      curY += (targetY - curY) * 0.16;
      hero.style.setProperty('--mx', curX + '%');
      hero.style.setProperty('--my', curY + '%');
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    hero.addEventListener('pointermove', (e) => {
      const rect = hero.getBoundingClientRect();
      targetX = ((e.clientX - rect.left) / rect.width) * 100;
      targetY = ((e.clientY - rect.top) / rect.height) * 100;
      if(!active){ active = true; spotlight.style.opacity = '1'; }
    });

    hero.addEventListener('pointerleave', () => {
      active = false;
      spotlight.style.opacity = '0';
    });
  })();
</script>
